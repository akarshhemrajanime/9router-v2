version: '3.8'

services:
  9router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 9router-v2
    ports:
      - "${PORT:-3000}:3000"
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REQUIRE_LOGIN=${REQUIRE_LOGIN:-true}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-here}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - DATABASE_PATH=/app/data/9router.db
    volumes:
      - 9router-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  9router-data:
    driver: local
